kind = "web"
previewPath = "/"
title = "THREE NINE BAR INVENTORY SYSTEM"
version = "1.0.0"
id = "artifacts/three-nine-bar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21572

[services.development]
run = "pnpm --filter @workspace/three-nine-bar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/three-nine-bar", "run", "build" ]
publicDir = "artifacts/three-nine-bar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21572"
BASE_PATH = "/"
